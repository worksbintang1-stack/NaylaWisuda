<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selamat Wisuda 🌸</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Cormorant Garamond", serif;
        background: linear-gradient(
          135deg,
          #fdeef1 0%,
          #f5c6d0 50%,
          #fdeef1 100%
        );
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
      }

      #app {
        min-height: 100vh;
        position: relative;
      }

      .landing-screen {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .button-wrapper {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        z-index: 100;
      }

      .curtain-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1000;
        display: flex;
        pointer-events: none;
      }

      .curtain {
        position: absolute;
        width: 50%;
        height: 100%;
        background: linear-gradient(
          90deg,
          #d4778a 0%,
          #e8a0b0 50%,
          #c2637a 100%
        );
        top: 0;
      }

      .curtain-left {
        left: 0;
        border-right: 3px solid #a85472;
        transform: translateX(0);
        animation: curtainOpen 1.2s ease-out 0.5s forwards;
        box-shadow: inset -20px 0px 40px rgba(0, 0, 0, 0.2);
      }

      .curtain-right {
        right: 0;
        border-left: 3px solid #a85472;
        transform: translateX(0);
        animation: curtainOpen2 1.2s ease-out 0.5s forwards;
        box-shadow: inset 20px 0px 40px rgba(0, 0, 0, 0.2);
      }

      @keyframes curtainOpen {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-100%);
        }
      }

      @keyframes curtainOpen2 {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(100%);
        }
      }

      .curtain::before {
        content: "";
        position: absolute;
        top: 0;
        width: 100%;
        height: 100%;
        background: repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.1) 0px,
          rgba(255, 255, 255, 0.1) 10px,
          transparent 10px,
          transparent 20px
        );
      }

      .gold-line {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 3px;
        height: 60%;
        background: linear-gradient(
          to bottom,
          transparent,
          #c9a96e,
          transparent
        );
        opacity: 0;
        animation: lineFlash 1.2s ease-out 0.5s forwards;
        z-index: 999;
      }

      @keyframes lineFlash {
        0%,
        10% {
          opacity: 0;
        }
        30% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      .content {
        position: relative;
        z-index: 10;
        text-align: center;
        opacity: 0;
        animation: fadeIn 0.8s ease-out 1.7s forwards;
      }

      @keyframes fadeIn {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .welcome-title {
        font-family: "Dancing Script", cursive;
        font-size: clamp(48px, 12vw, 80px);
        color: #c2637a;
        line-height: 1.2;
        margin-bottom: 20px;
        text-shadow: 2px 2px 4px rgba(194, 99, 122, 0.2);
      }

      .welcome-subtitle {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: clamp(18px, 4vw, 28px);
        color: #7a4f57;
        letter-spacing: 2px;
        margin-bottom: 40px;
        text-transform: uppercase;
      }

      .hearts {
        font-size: 24px;
        letter-spacing: 10px;
        animation: floatHearts 1s ease-in-out infinite;
        animation-delay: 2.5s;
      }

      @keyframes floatHearts {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .tap-text {
        font-style: italic;
        color: #b07080;
        font-size: 14px;
        margin-top: 30px;
        opacity: 0;
        animation: fadeIn 0.8s ease-out 2.5s forwards;
      }

      /* Button Wrapper */
      .button-wrapper {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 30px 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        z-index: 100;
        pointer-events: none;
      }

      .music-btn {
        background: radial-gradient(circle at top left, #f9d9e0, #f1a7bf);
        color: #6f2b44;
        border: 2px solid rgba(255, 255, 255, 0.8);
        padding: 12px 24px;
        border-radius: 40px;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(194, 99, 122, 0.25);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        opacity: 0;
        animation: fadeIn 0.8s ease-out 2.5s forwards;
        font-family: "Cormorant Garamond", serif;
        letter-spacing: 0.5px;
        pointer-events: auto;
      }

      .music-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 12px 24px rgba(194, 99, 122, 0.35);
      }

      .music-btn:active {
        transform: scale(0.96);
      }

      /* Petals Animation */
      .petal-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 5;
      }

      .petal {
        position: absolute;
        width: 10px;
        height: 10px;
        background: radial-gradient(ellipse at 40% 30%, #f5d0d8, #e8a0b0);
        border-radius: 50% 0%;
        opacity: 0;
        animation: petalsFloat 3s linear infinite;
      }

      @keyframes petalsFloat {
        0% {
          transform: translateY(-10vh) translateX(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 0.5;
        }
        100% {
          transform: translateY(100vh) translateX(100px) rotate(360deg);
          opacity: 0;
        }
      }

      /* Sparkles */
      .sparkle {
        position: fixed;
        pointer-events: none;
        z-index: 5;
      }

      .sparkle::before {
        content: "✨";
        font-size: 20px;
        display: block;
      }

      .continue-btn {
        background: linear-gradient(135deg, #c2637a, #e8a0b0);
        color: white;
        border: none;
        padding: 14px 32px;
        border-radius: 50px;
        font-size: 16px;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(194, 99, 122, 0.3);
        transition: all 0.3s ease;
        opacity: 0;
        animation: fadeIn 0.8s ease-out 2.5s forwards;
        font-family: "Cormorant Garamond", serif;
        letter-spacing: 1px;
        white-space: nowrap;
        pointer-events: auto;
      }

      .continue-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 12px 30px rgba(194, 99, 122, 0.5);
      }

      .continue-btn:active {
        transform: scale(0.98);
      }

      @media (max-width: 480px) {
        .button-wrapper {
          padding: 15px;
        }

        .continue-btn {
          padding: 12px 24px;
          font-size: 14px;
        }

        .welcome-title {
          font-size: clamp(36px, 10vw, 56px);
          margin-bottom: 15px;
        }

        .hearts {
          font-size: 20px;
          letter-spacing: 8px;
        }

        .tap-text {
          font-size: 12px;
          margin-top: 20px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Audio element untuk musik Jatuh Suka -->
    <audio id="bgMusic" preload="auto" volume="0.6" loop>
      <source
        src="mp3/jatuh suka.mp3"
        type="audio/mpeg"
      />
    </audio>

    <div id="app">
      <div class="landing-screen">
        <div class="petal-container" id="petalContainer"></div>

        <div class="curtain-container">
          <div class="curtain curtain-left"></div>
          <div class="curtain curtain-right"></div>
          <div class="gold-line"></div>
        </div>

        <div class="content">
          <div class="welcome-title">Selamat<br />Wisuda</div>
          <div class="welcome-subtitle">✦ Sayangku ✦</div>
          <div class="hearts">💗 🌸 💗</div>
          <div class="tap-text">Klik untuk melanjutkan...</div>
        </div>

        <div class="button-wrapper">
          <button class="music-btn" onclick="toggleMusic()" aria-label="Putar musik">
            🎶 Putar Musik
          </button>
          <button class="continue-btn" onclick="goToMain()">
            Lihat Kejutan ✨
          </button>
        </div>
      </div>
    </div>

    <script>
      // Create floating petals
      const petalContainer = document.getElementById("petalContainer");
      for (let i = 0; i < 15; i++) {
        const petal = document.createElement("div");
        petal.className = "petal";
        petal.style.left = Math.random() * 100 + "%";
        petal.style.animationDelay = 0.8 + Math.random() * 2 + "s";
        petal.style.animationDuration = 3 + Math.random() * 2 + "s";
        petalContainer.appendChild(petal);
      }

      // Create sparkles
      function createSparkle() {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.style.left = Math.random() * window.innerWidth + "px";
        sparkle.style.top = Math.random() * window.innerHeight + "px";
        document.body.appendChild(sparkle);

        setTimeout(() => sparkle.remove(), 500);
      }

      // Create sparkles after curtain opens
      setTimeout(() => {
        for (let i = 0; i < 20; i++) {
          setTimeout(createSparkle, i * 50);
        }
      }, 1000);

      // Click button to go to main page
      let alreadyClicked = false;
      let musicPlaying = false;
      const music = document.getElementById("bgMusic");
      const musicButton = document.querySelector(".music-btn");

      function updateMusicButton() {
        if (!musicButton) return;
        musicButton.textContent = musicPlaying ? "⏸️ Musik" : "🎶 Putar Musik";
      }

      function toggleMusic() {
        if (!music) return;

        if (music.paused) {
          music.volume = 0.7;
          const playPromise = music.play();
          if (playPromise !== undefined) {
            playPromise
              .then(() => {
                musicPlaying = true;
                updateMusicButton();
              })
              .catch((err) => console.log("Audio play failed:", err));
          } else {
            musicPlaying = true;
            updateMusicButton();
          }
        } else {
          music.pause();
          musicPlaying = false;
          updateMusicButton();
        }
      }

      async function goToMain() {
        if (alreadyClicked) return;
        alreadyClicked = true;

        if (music) {
          music.volume = 0.7;
          const playPromise = music.play();
          if (playPromise !== undefined) {
            playPromise.catch((err) => console.log("Audio play failed:", err));
          }
        }

        document.querySelector('.continue-btn').textContent = 'Memuat...';
        document.querySelector('.continue-btn').disabled = true;

        await loadPage('wisuda-romantis.html');
      }

      async function loadPage(url) {
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error('Fetch failed');
          const html = await response.text();
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');

          const newTitle = doc.querySelector('title');
          if (newTitle) document.title = newTitle.textContent;

          const headStyles = doc.querySelectorAll('head style, head link[rel="stylesheet"]');
          headStyles.forEach((node) => {
            document.head.appendChild(node.cloneNode(true));
          });

          const app = document.getElementById('app');
          if (!app) return;
          app.innerHTML = doc.body.innerHTML;

          window.history.pushState(null, '', url);

          const scripts = doc.querySelectorAll('script');
          scripts.forEach((script) => {
            if (script.src) {
              const newScript = document.createElement('script');
              newScript.src = script.src;
              document.body.appendChild(newScript);
            } else {
              const inline = document.createElement('script');
              inline.textContent = script.textContent;
              document.body.appendChild(inline);
            }
          });
        } catch (err) {
          console.error(err);
          const newTab = window.open(url, '_blank');
          if (!newTab) {
            window.location.href = url;
          }
        }
      }

      updateMusicButton();
      document.querySelector('.continue-btn').addEventListener('click', goToMain);
    </script>
  </body>
</html>
